<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>HC Suggest</title>
<style>
  html,body { margin:0; padding:0; font: 13px/1.4 -apple-system,"Segoe UI",Roboto,sans-serif; width: 260px; }
  .box { padding: 12px 14px; }
  h1 { margin: 0 0 4px; font-size: 14px; }
  p.muted { margin: 0 0 10px; color: #666; font-size: 12px; }
  button { font: inherit; padding: 7px 12px; border: 1px solid #2a6df4; background: #2a6df4; color: white; border-radius: 4px; cursor: pointer; width: 100%; }
</style>
</head>
<body>
<div class="box">
  <h1>HC Suggest</h1>
  <p class="muted">Plans take ~30–90 s. Popups close when Firefox loses focus, so the real UI runs in a tab.</p>
  <button id="open">Open dashboard</button>
</div>
<script src="popup.js"></script>
</body>
</html>
